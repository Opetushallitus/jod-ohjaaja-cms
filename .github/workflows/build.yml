name: build
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    permissions:
      checks: write
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Verify third-party action commits are at least 7 days old
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/verify-github-actions-min-commit-age.sh

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: corretto
          java-version: 21

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Run jod-cms-testrunner-client unit tests
        run: ./gradlew --no-daemon :test:jod-cms-testrunner-client:test

      - name: Test with Gradle
        run: ./gradlew --no-daemon clean testWithDockerContainer

      - name: Upload test reports
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: always()
        with:
          name: test-reports
          path: build/reports/unified-tests
          retention-days: 30

      - name: Build with Gradle
        run: ./gradlew --no-daemon clean createDockerfile dockerDeploy

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: application
          include-hidden-files: true
          path: |
            build/docker/*

  upgrade_check:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      upgrade_required: ${{ steps.diff.outputs.upgrade_required }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Parse gradle.properties
        id: parse
        run: |
          IMAGE=$(grep '^liferay.workspace.docker.image.liferay=' gradle.properties | cut -d'=' -f2 | xargs)
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Compare images and decide
        id: diff
        run: |
          if [ "${{ steps.parse.outputs.image }}" != "${{ vars.JOD_LIFERAY_DOCKER_IMAGE }}" ]; then
            echo "upgrade_required=true" >> $GITHUB_OUTPUT
          else
            echo "upgrade_required=false" >> $GITHUB_OUTPUT
          fi

  package:
    needs: build
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.short-tag.outputs.tag }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: application
          path: build/docker

      - uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: ${{ secrets.JOD_UTIL_AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        id: docker-meta
        with:
          images: "${{ secrets.JOD_ECR }}/oph/jod-ohjaaja-cms"
          tags: |
            type=sha

      - name: Output short tag
        id: short-tag
        run: |
          echo "Short tag: ${DOCKER_METADATA_OUTPUT_TAGS##*:}"
          echo "tag=${DOCKER_METADATA_OUTPUT_TAGS##*:}" >> $GITHUB_OUTPUT

      - name: Login to ECR
        id: ecr-login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ secrets.JOD_ECR }}

      - name: Build and push image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        id: docker-build
        with:
          pull: true
          push: "${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}"
          platforms: linux/arm64,linux/amd64
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          file: build/docker/Dockerfile
          context: build/docker
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    if: (github.ref == 'refs/heads/main'  || github.event_name == 'workflow_dispatch') && needs.upgrade_check.outputs.upgrade_required == 'false'
    needs:
      - package
      - upgrade_check
    uses: ./.github/workflows/deploy.yml
    permissions:
      id-token: write
      contents: write
    secrets: inherit
    with:
      environment: dev
      tag: ${{ needs.package.outputs.tag }}

  deploy-test:
    if: github.ref == 'refs/heads/main' && needs.upgrade_check.outputs.upgrade_required == 'false'
    needs:
      - package
      - deploy-dev
      - upgrade_check
    uses: ./.github/workflows/deploy.yml
    permissions:
      id-token: write
      contents: write
    secrets: inherit
    with:
      environment: test
      tag: ${{ needs.package.outputs.tag }}

  deploy-production:
    if: github.ref == 'refs/heads/main' && needs.upgrade_check.outputs.upgrade_required == 'false'
    needs:
      - package
      - deploy-dev
      - upgrade_check
    uses: ./.github/workflows/deploy.yml
    permissions:
      id-token: write
      contents: write
    secrets: inherit
    with:
      environment: production
      tag: ${{ needs.package.outputs.tag }}
